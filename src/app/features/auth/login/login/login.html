<div class="login-container">

  <h2>Login</h2>

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="email"
  />

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password"
  />

  <button (click)="login()">
    Login
  </button>

  @if (errorMessage) {
  <p>{{ errorMessage }}</p>
    }

</div>

<p class="register-link">
  Don’t have an account?
  <a routerLink="/register">Register here</a>
</p>
