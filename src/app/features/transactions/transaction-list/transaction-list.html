<button routerLink="/dashboard" class="back-btn">
  ← Back to Dashboard
</button>

<div class="transaction-list">

  <h2>Transactions</h2>

  @for (t of transactions; track t.id) {
    <mat-card class="transaction-card">

      <div class="row">
        <span class="cat">{{ t.category }}</span>
        <span class="amount">{{ t.amount }}</span>
      </div>

      <div class="meta">
        <small>{{ t.date }}</small>
        <small>{{ t.type }}</small>
      </div>

      <div class="actions">
        <button mat-button (click)="editTransaction(t)">Edit</button>
        <button mat-button color="warn" (click)="deleteTransaction(t.id!)">Delete</button>
      </div>

    </mat-card>
  }

</div>
